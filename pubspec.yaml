name: student_companion
description: A modern Flutter Student Productivity App

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🎨 UI / Fonts
  google_fonts: ^6.1.0

  # 🎵 Audio player
  just_audio: ^0.9.36

  # 🎬 Video player (web + desktop supported)
  video_player: ^2.8.1

  # 🌐 HTTP requests (future chatbot / API use)
  http: ^1.2.0

  # 📂 Web-safe file picker (replaces image_picker for web)
  file_picker: ^8.0.0

  # 🎬 Lottie animations (stickers, splash, UI animations)
  lottie: ^3.1.2

  # 🔥 Firebase
  firebase_core: ^4.7.0
  firebase_auth: 6.4.0
  cloud_firestore: ^6.3.0
  fl_chart: ^0.68.0

  # 🎥 YouTube player (web-compatible)
  youtube_player_iframe: ^5.0.0

  # 💾 Shared preferences for theme persistence
  shared_preferences: ^2.2.3

  image: ^4.8.0

  # 📅 Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Optional: if you later add assets
  # assets:
  #   - assets/images/
  #   - assets/lottie/
